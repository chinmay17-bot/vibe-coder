<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background-image: linear-gradient(to bottom, #0d1117, #1a1a2e);
            color: #e6edf3;
            text-align: center;
        }
        header {
            padding: 2rem;
            background-color: #1a1a2e;
            border-bottom: 1px solid #e74c3c;
        }
        header h1 {
            font-size: 36px;
            font-weight: 600;
            color: #3498db;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 2rem;
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: #f1c40f;
            border: 1px solid #e74c3c;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .cell:hover {
            transform: scale(1.05);
        }
        .cell.marked {
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        @keyframes fadeIn {
            100% {
                opacity: 1;
            }
        }
        .cell.x {
            font-size: 48px;
            color: #e74c3c;
        }
        .cell.o {
            font-size: 48px;
            color: #3498db;
        }
        footer {
            padding: 2rem;
            background-color: #1a1a2e;
            border-top: 1px solid #e74c3c;
        }
        .reset-button {
            width: 200px;
            height: 40px;
            background-color: #2ecc71;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .reset-button:hover {
            background-color: #1abc9c;
        }
        .reset-button:active {
            transform: scale(0.95);
        }
        @media (max-width: 768px) {
            .game-board {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                padding: 1rem;
            }
            .cell {
                width: 80px;
                height: 80px;
            }
        }
        @media (max-width: 480px) {
            .game-board {
                grid-template-columns: repeat(3, 1fr);
                gap: 5px;
                padding: 0.5rem;
            }
            .cell {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Tic Tac Toe</h1>
    </header>
    <main>
        <div class="game-board">
            <div class="cell" id="cell-0"></div>
            <div class="cell" id="cell-1"></div>
            <div class="cell" id="cell-2"></div>
            <div class="cell" id="cell-3"></div>
            <div class="cell" id="cell-4"></div>
            <div class="cell" id="cell-5"></div>
            <div class="cell" id="cell-6"></div>
            <div class="cell" id="cell-7"></div>
            <div class="cell" id="cell-8"></div>
        </div>
    </main>
    <footer>
        <button class="reset-button" id="reset-button">Reset Game</button>
    </footer>
    <script>
        let currentPlayer = 'x';
        let gameBoard = ['', '', '', '', '', '', '', '', ''];
        let winningCombinations = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const cells = document.querySelectorAll('.cell');
            const resetButton = document.getElementById('reset-button');

            cells.forEach((cell, index) => {
                cell.addEventListener('click', () => {
                    if (gameBoard[index] === '') {
                        gameBoard[index] = currentPlayer;
                        cell.classList.add('marked');
                        if (currentPlayer === 'x') {
                            cell.classList.add('x');
                            cell.textContent = 'X';
                            currentPlayer = 'o';
                        } else {
                            cell.classList.add('o');
                            cell.textContent = 'O';
                            currentPlayer = 'x';
                        }
                        checkForWinner();
                    }
                });
            });

            resetButton.addEventListener('click', () => {
                gameBoard = ['', '', '', '', '', '', '', '', ''];
                currentPlayer = 'x';
                const cells = document.querySelectorAll('.cell');
                cells.forEach((cell) => {
                    cell.classList.remove('marked', 'x', 'o');
                    cell.textContent = '';
                });
            });

            function checkForWinner() {
                winningCombinations.forEach((combination) => {
                    if (
                        gameBoard[combination[0]] === gameBoard[combination[1]] &&
                        gameBoard[combination[1]] === gameBoard[combination[2]] &&
                        gameBoard[combination[0]] !== ''
                    ) {
                        alert(`Player ${gameBoard[combination[0]].toUpperCase()} wins!`);
                        resetButton.click();
                    }
                });
            }
        });
    </script>
</body>
</html>

services:
  # Python FastAPI — AI agent pipeline
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.python
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  # React client — built and served via Nginx
  client:
    build:
      context: ./editor/client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - orchestrator
    restart: unless-stopped

  # Orchestrator — spawns one editor-server container per browser session
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "1234:1234"
    environment:
      - FASTAPI_URL=http://fastapi:8000
    volumes:
      # Mount Docker socket so orchestrator can spawn sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - fastapi
    restart: unless-stopped

  # editor-server image — built but NOT started as a service.
  # The orchestrator spawns instances of this image on demand.
  editor-server:
    build:
      context: ./editor/server
      dockerfile: Dockerfile
    image: coder-buddy-editor-server   # named so orchestrator can reference it
    profiles:
      - build-only                     # prevents compose from auto-starting it

volumes:
  workspace:
